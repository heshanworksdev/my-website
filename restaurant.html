<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crust & Co</title>
</head>
<body>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial; background: #0d0d0d; color: white; }
  nav { background: #c0392b; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
  nav h1 { color: white; font-size: 24px; }
  nav a { color: white; text-decoration: none; margin-left: 20px; font-weight: bold; }
  .hero { background: #1a1a1a; text-align: center; padding: 80px 20px; }
  .hero h2 { font-size: 48px; color: #e74c3c; margin-bottom: 15px; }
  .hero p { font-size: 18px; color: #ccc; margin-bottom: 30px; }
  .btn {background: #e74c3c; color: white; padding: 15px 35px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
  .menu { padding: 50px 30px; text-align: center; }
  .menu h2 { color: #e74c3c; font-size: 32px; margin-bottom: 30px; }
  .menu-grid { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
  .menu-item { background: #1a1a1a; border: 1px solid #e74c3c; border-radius: 12px; padding: 20px; width: 200px; }
  .menu-item h3 { color: #e74c3c; margin-bottom: 8px; }
  .menu-item p { color: #ccc; font-size: 14px; margin-bottom: 10px; }
  .price { color: #f39c12; font-weight: bold; font-size: 18px; }  
</style>

<nav>
  <h1>Crust & Co 🍕</h1>
  <div>
    <a href="#">Home</a>
    <a href="#">Menu</a>
    <a href="#">Order Now</a>
  </div>  
</nav>

<div class="hero">
  <h2>Crust & Co Pizza</h2>
  <p>Made with love, baked to perfection 🔥</p>
  <button class="btn">Order Now</button>
</div>

<div class="menu">
  <h2>Our Pizzas</h2>
  <div class="menu-grid">
    <div class="menu-item">
      <h3>🍕 Margherita</h3>
      <p>Classic tomato sauce with fresh mozzarella</p>
      <span class="price">$12.99</span>
  </div>
  <div class="menu-item">
    <h3>🥩 Pepperoni</h3>
    <p>Loaded with premium pepperoni slices</p>
    <span class="price">$14.99</span>
  </div>
  <div class="menu-item">
    <h3>🥦 Veggie</h3>
    <p>Fresh vegetables on garlic butter base</p>
    <span class="price">$13.99</span>
  </div>
 </div>
</div>

</body>
</html>
